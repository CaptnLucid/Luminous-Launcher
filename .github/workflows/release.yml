name: Build and Automatically Release Launcher

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code Repo
        uses: actions/checkout@v4

      - name: Setup Go Runtime Environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node.js Runtime Environment (Required for Frontend Assets)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails Compiler CLI Framework
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Compile and Bundle Optimized Production Asset Binary
        run: |
          # 💡 Uses -ldflags to inject the git tag version directly into the Go variable at build time
          wails build -platform windows/amd64 -compilerflags "-ldflags -X 'main.backend.CurrentVersion=${{ github.ref_name }}'"

      - name: Structure and Compress Release Zip Archive
        shell: powershell
        run: |
          # 1. Create a clean temporary workspace for the release payload
          New-Item -ItemType Directory -Force -Path .\dist_staging

          # 2. Copy the newly compiled executable binary
          Copy-Item -Path .\build\bin\BdoLauncher.exe -Destination .\dist_staging\

          # 3. Copy the nvidiaProfileInspector folder asset recursively
          if (Test-Path .\assets\nvidiaProfileInspector) {
              Copy-Item -Path .\assets\nvidiaProfileInspector -Destination .\dist_staging\ -Recurse
          }

          # 4. Copy the populated profiles folder asset recursively (including your .nip files)
          if (Test-Path .\assets\profiles) {
              Copy-Item -Path .\assets\profiles -Destination .\dist_staging\ -Recurse
          }

          # 5. Compress the folder into a structured distribution zip
          Compress-Archive -Path .\dist_staging\* -DestinationPath .\build\bin\BdoLauncher_v${{ github.ref_name }}.zip

      - name: Generate Automated GitHub Release Page
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/BdoLauncher_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
